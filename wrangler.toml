name = "varax-website"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "LICENSE_KV"
id = "<created-at-deploy-time>"

# Secrets (set via `npx wrangler pages secret put`):
# ED25519_SEED
# ED25519_PUBLIC_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_SECRET_KEY
# RESEND_API_KEY
